<!DOCTYPE html>
<html lang="en">
<head>

    <title>Type Coercion in JavaScript</title>
    <script>
        function main()
        {
            let n= 5 + "2";
            console.log(n,typeof n); 

             n= 5 * "2";
            console.log(n,typeof n); 
            
             n= 5 - "2";
            console.log(n,typeof n); 
            
             n= 5 + "JSp";
            console.log(n,typeof n);
            
             n= 5 * "JSp";
            console.log(n,typeof n); 
            
            
        }
        main();
    </script>
</head>
<body>
    <h1 align="center">Type Coercion in JavaScript</h1>
</body>
</html>
