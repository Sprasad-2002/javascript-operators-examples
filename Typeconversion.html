<html></html>
<head>
    <title>Type Conversion in JavaScript</title>
    <script>
        let n1=Number("5");
        let n2=Number("10");
        console.log("n1 + n2 = " + (n1 + n2)); // Converts strings to numbers and adds them
    </script>
</head>
<body>
    <h1>Type Conversion in JavaScript</h1>
    <p>JavaScript provides several methods for converting between different data types.</p>
</body>
