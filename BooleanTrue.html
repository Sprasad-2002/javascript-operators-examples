<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Boolean True Examples</title>
    <script>
        function main()
        {
            let n= Boolean(0.0001);
            console.log(n,typeof n); 

            n= Boolean(" ");
            console.log(n,typeof n); 
            
            n= Boolean('RajaSaheb ');          
            console.log(n,typeof n);            

            n= Boolean(10);  
            console.log(n,typeof n);
            
            n= Boolean(5*"JSp");
            console.log(n,typeof n);

            n= Boolean(true);
            console.log(n,typeof n);

            n= Boolean("5"*"2");
            console.log(n,typeof n);


        }
        main();
    </script>
</head>
<body>
    <h1 align="center" >Boolean True Examples</h1>
</body>
</html>
