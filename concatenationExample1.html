<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>concatenation-Operator-Example</title>
    <script>
        function main()
        {
            console.log(5+2);
            console.log(typeof (5+2));
            console.log(5+"2");
            console.log(typeof (5+"2"));
            console.log("2"+5);
            console.log(typeof ("2"+5));
            console.log("5"+"2");
            console.log(typeof ("5"+"2"));
        }
        main();
    </script>
</head>
<body>
    <h1 align="center">Concatenation Operators Examples</h1>
</body>
</html>
