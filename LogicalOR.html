<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Logical OR Operator</title>
    <script>
        let a=5
        let b=6
        console.log(a>b || b<a);

        console.log("--------------");

        console.log(a<b || b<a);

        console.log("--------------");

        console.log(a<b || b>a);

        console.log("--------------");

        console.log(++a <= 5 || ++b > 1);
        console.log(a);
        console.log(b);

        console.log("--------------");
        
        console.log(a++ <= 5 || b++ > 5);
        console.log(a);
        console.log(b);
        console.log("--------------");

        console.log(a++  || b++ );
        console.log(a);
        console.log(b);
        console.log("--------------");

        console.log(++a  ||  ++b );
        console.log(a);
        console.log(b);
        console.log("--------------");

        console.log(true || 1 || 0 || "JSp");
        console.log("--------------");

        console.log(false || 0 || 2 || "JSp");
        console.log("--------------");
    
    </script>
</head>
<body>
    <h1>Logical OR Operator</h1>
</body>
</html>
