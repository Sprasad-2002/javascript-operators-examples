<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>concatenation-Operator</title>
    <script>
        function main()
        {
            let n;
            n=90003;
            console.log("Value of n is: "+ n)
            let a=15;
            let b=4;
            console.log("a + b = " + (a + b)); 
            console.log("Addition of TWo Num is: "+(a+b)); // Concatenation
            console.log("a - b = " + (a - b)); 
            console.log("a * b = " + (a * b)); 
            console.log("a / b = " + (a / b)); 
            console.log("a / b = " + Math.trunc(a / b)); 
            console.log("a % b = " + (a % b)); 
            console.log("a ** b = " + (a ** b)); 
        }
        main();
    </script>
</head>
<body>
    <h1 align="center">Concatenation Operators</h1>
</body>
</html>
