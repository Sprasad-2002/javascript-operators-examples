<!DOCTYPE html>
<html lang="en">
<head>

    <title>Prompt Method Example</title>
    <script>
        function main()
        {
           let n1=Number(prompt("Enter n1 value:"));
           let n2=Number(prompt("Enter n2 value:"));
           console.log("n1 + n2 = " + (n1 + n2));
        }
        main();
    </script>
</head>
<body> 
    <h1 align="center">Prompt Method Example</h1>
</body>
</html>
