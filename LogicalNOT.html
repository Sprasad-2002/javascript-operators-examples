<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Logical NOT Operator</title>
    <script>
        console.log(! true);
        console.log("______");

        console.log(! 0);
        console.log("______");

        console.log(! "JSP");
        console.log("______");

        console.log(! "");
        console.log("______");


        console.log(! 4 );
        console.log("______");
    </script>
</head>
<body>
    <h1>Logical NOT Operator</h1>
</body>
</html>
